<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Intima</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;background:#FBF7F4;font-family:'Segoe UI',system-ui,sans-serif;}
  #root{height:100%;display:flex;justify-content:center;}
  input,textarea,button{font-family:inherit;}
  ::-webkit-scrollbar{width:0;background:transparent;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

const C = {
  rose:"#8B2252",roseMid:"#B85080",roseLight:"#E8A0BC",rosePale:"#F9EEF3",
  cream:"#FBF7F4",stemD:"#3D6B35",stemL:"#6AAF5C",leafG:"#5A9A50",leafPale:"#C4DDB8",
  text:"#2A1820",textMid:"#7A5060",textSoft:"#B08898",white:"#FFFFFF",gold:"#C8924A",
};

const SECTIONS = [
  {id:"conflicts", label:"Conflicts",       hint:"Navigate tension together"},
  {id:"checkins",  label:"Daily check-ins",  hint:"How are you today?"},
  {id:"surprises", label:"Surprises",        hint:"Keep the spark alive"},
  {id:"intimacy",  label:"Intimate life",    hint:"Closeness & desire"},
  {id:"general",   label:"General",          hint:"Everyday connection"},
];

const CHECKIN_QS = [
  {id:"mood",       q:"How are you feeling today?",                     type:"choice",options:["Joyful","Calm","Anxious","Tired","Frustrated"]},
  {id:"connection", q:"How connected do you feel to your partner?",     type:"choice",options:["Very close","Warmer than usual","Neutral","A bit distant","We had tension"]},
  {id:"need",       q:"What do you most need from them today?",         type:"choice",options:["Quality time","Kind words","Physical closeness","Some space","Practical help"]},
  {id:"gratitude",  q:"One thing you appreciate about them this week?", type:"text",  placeholder:"Something small counts…"},
  {id:"unsaid",     q:"Anything sitting with you, unsaid?",             type:"text",  placeholder:"It's safe to be honest here…"},
];

const PROFILE_QS = [
  {id:"name",  q:"What's your name?",                type:"text",  placeholder:"Your name…"},
  {id:"style", q:"When conflict arises, I usually…", type:"choice",options:["Go quiet","Talk immediately","Need time first","Explode, then calm"]},
  {id:"love",  q:"I feel most loved when…",          type:"choice",options:["Quality time together","Words of appreciation","Physical affection","Thoughtful gestures","Acts of help"]},
  {id:"fear",  q:"My biggest relationship fear…",    type:"choice",options:["Being abandoned","Losing independence","Not being enough","Endless conflict","Growing apart"]},
  {id:"after", q:"After a tough day I need…",        type:"choice",options:["Hugs & presence","Space to decompress","Someone to listen","Distraction & fun"]},
];

const PROMPTS = {
  conflicts:["We argue about the same thing over and over.","I feel unheard during arguments.","How do I raise something sensitive without it exploding?","We said hurtful things — how do we repair?"],
  surprises:["Give me a meaningful surprise idea for my partner.","How do I keep spontaneity alive long-term?","What small gesture could mean a lot right now?"],
  intimacy: ["How do we talk about intimate needs without awkwardness?","Intimacy has faded — how do I bring it up?","How do I express desire without making them feel pressured?"],
  general:  ["How do we make quality time despite busy lives?","I feel taken for granted. How do I say this?","What daily habits strengthen us?"],
};

const SYS=(p,sec,ci)=>`You are Intima, a warm empathetic relationship coach. Speak like a wise trusted friend — never clinical or preachy.
Profile — Name: ${p.name||"Partner"}, Conflict style: ${p.style||"?"}, Love language: ${p.love||"?"}, Fear: ${p.fear||"?"}, After hard days: ${p.after||"?"}.
${ci?`Recent check-in: ${ci}`:""}
Section: ${sec}. Be personal, warm, actionable (3–4 short paragraphs). End with one doable action for today.`;

const api=async(system,messages,max=1000)=>{
  const body={model:"claude-sonnet-4-20250514",max_tokens:max,messages};
  if(system)body.system=system;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d=await r.json();
  return d.content?.[0]?.text||"";
};

function RoseSVG({progress,onLeafClick,onHeadClick}){
  const [hov,setHov]=useState(null);
  const W=340,H=580,sx=76,stemTop=145,stemBot=H-18;
  const leaves=[
    {sec:"conflicts",yFrac:0.17,w:228,h:62},
    {sec:"checkins", yFrac:0.33,w:212,h:57},
    {sec:"surprises",yFrac:0.48,w:198,h:53},
    {sec:"intimacy", yFrac:0.63,w:186,h:49},
    {sec:"general",  yFrac:0.77,w:172,h:46},
  ];
  const leafFill  =i=>i%2===0?"#7DBF6A":"#EAC8D8";
  const leafStroke=i=>i%2===0?"#4A8A3A":"#AA6088";
  const leafText  =i=>i%2===0?"#1E4A15":"#5A1838";
  const leafSheen =i=>i%2===0?"rgba(255,255,255,0.45)":"rgba(255,255,255,0.38)";

  return(
    <svg viewBox={`0 0 ${W} ${H}`} width={W} height={H} style={{display:"block",flexShrink:0}}>
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#2E5828"/><stop offset="45%" stopColor="#6AAF5C"/><stop offset="100%" stopColor="#2E5828"/>
        </linearGradient>
        <radialGradient id="rp1" cx="50%" cy="75%" r="65%">
          <stop offset="0%" stopColor="#C03060"/><stop offset="55%" stopColor="#8B1A3A"/><stop offset="100%" stopColor="#5A0E25"/>
        </radialGradient>
        <radialGradient id="rp2" cx="48%" cy="70%" r="60%">
          <stop offset="0%" stopColor="#D04070"/><stop offset="50%" stopColor="#A02848"/><stop offset="100%" stopColor="#6B1530"/>
        </radialGradient>
        <radialGradient id="rp3" cx="52%" cy="68%" r="55%">
          <stop offset="0%" stopColor="#E05080"/><stop offset="55%" stopColor="#B03560"/><stop offset="100%" stopColor="#7A2040"/>
        </radialGradient>
        <radialGradient id="rpC" cx="50%" cy="60%" r="50%">
          <stop offset="0%" stopColor="#E87090"/><stop offset="50%" stopColor="#C04870"/><stop offset="100%" stopColor="#8A2850"/>
        </radialGradient>
        {leaves.map((_,i)=>(
          <linearGradient key={`lg${i}`} id={`lg${i}`} x1="0%" y1="0%" x2="100%" y2="20%">
            <stop offset="0%"   stopColor={i%2===0?"#3A7030":"#905070"} stopOpacity="0.85"/>
            <stop offset="25%"  stopColor={leafFill(i)}/>
            <stop offset="75%"  stopColor={i%2===0?"#8ED07E":"#F0D0E0"}/>
            <stop offset="100%" stopColor={i%2===0?"#5A9848":"#C88098"} stopOpacity="0.75"/>
          </linearGradient>
        ))}
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <ellipse cx={sx+60} cy={stemTop+80}  rx={180} ry={140} fill="#F5E0EB" opacity="0.22"/>
      <ellipse cx={sx+80} cy={stemTop+200} rx={160} ry={120} fill="#E8F0DE" opacity="0.18"/>
      <ellipse cx={sx+40} cy={stemTop+360} rx={140} ry={110} fill="#F5E8D8" opacity="0.16"/>
      {[[180,90],[220,180],[260,130],[290,260],[240,340],[195,410],[310,380],[170,310]].map(([px,py],i)=>(
        <ellipse key={`pf${i}`} cx={px} cy={py} rx={5+i%3*2} ry={3+i%2} fill="#D4789A" opacity="0.1"
          transform={`rotate(${i*37},${px},${py})`}/>
      ))}

      {/* ── COUPLE SILHOUETTE — bottom right, soft shadow ── */}
      {/* figure 1: leaning left head */}
      <ellipse cx={268} cy={430} rx={13} ry={14} fill="#C47B9F" opacity="0.13"/>
      {/* figure 1: neck */}
      <rect x={263} y={443} width={10} height={9} rx={4} fill="#C47B9F" opacity="0.11"/>
      {/* figure 1: body */}
      <path d="M248,452 C252,448 278,448 282,452 L284,490 C280,492 250,492 246,490 Z" fill="#C47B9F" opacity="0.1"/>
      {/* figure 1: arm reaching toward figure 2 */}
      <path d="M280,462 Q302,455 316,458" stroke="#C47B9F" strokeWidth="7" fill="none" strokeLinecap="round" opacity="0.1"/>

      {/* figure 2: head (slightly taller, leaning in) */}
      <ellipse cx={316} cy={424} rx={12} ry={13} fill="#9B3A5A" opacity="0.13"/>
      {/* figure 2: neck */}
      <rect x={311} y={436} width={10} height={8} rx={4} fill="#9B3A5A" opacity="0.11"/>
      {/* figure 2: body */}
      <path d="M298,444 C302,440 330,440 334,444 L336,484 C332,486 300,486 296,484 Z" fill="#9B3A5A" opacity="0.1"/>
      {/* figure 2: arm around figure 1 */}
      <path d="M300,456 Q284,450 272,454" stroke="#9B3A5A" strokeWidth="7" fill="none" strokeLinecap="round" opacity="0.1"/>

      {/* small heart above them */}
      <path d="M289,414 C289,411 292,409 294,411 C296,409 299,411 299,414 C299,417 294,421 294,421 C294,421 289,417 289,414 Z" fill="#C47B9F" opacity="0.18"/>

      {/* ── SCATTERED BOTANICAL DETAILS ── */}
      {/* small leaf sprigs bottom-right area */}
      <path d="M308,500 Q316,492 322,496" stroke="#7BC47B" strokeWidth="1.5" fill="none" strokeLinecap="round" opacity="0.2"/>
      <ellipse cx={323} cy={495} rx={5} ry={3} fill="#7BC47B" opacity="0.15" transform="rotate(-30,323,495)"/>
      <path d="M318,508 Q326,500 332,504" stroke="#7BC47B" strokeWidth="1.5" fill="none" strokeLinecap="round" opacity="0.18"/>
      <ellipse cx={333} cy={503} rx={4} ry={2.5} fill="#7BC47B" opacity="0.13" transform="rotate(-25,333,503)"/>

      {/* falling petal top-right */}
      <ellipse cx={298} cy={88} rx={6} ry={3.5} fill="#E8A0BC" opacity="0.18" transform="rotate(40,298,88)"/>
      <ellipse cx={310} cy={108} rx={5} ry={3} fill="#E8A0BC" opacity="0.14" transform="rotate(-20,310,108)"/>
      <ellipse cx={286} cy={120} rx={4} ry={2.5} fill="#C47B9F" opacity="0.12" transform="rotate(55,286,120)"/>

      {/* distant moon / soft orb top-right corner */}
      <circle cx={308} cy={52} r={22} fill="#FFF0F6" opacity="0.28"/>
      <circle cx={308} cy={52} r={16} fill="#FAD8E8" opacity="0.2"/>
      <circle cx={308} cy={52} r={9}  fill="#F5C0D8" opacity="0.18"/>
      <ellipse cx={sx} cy={stemBot} rx={28} ry={8} fill="#C4A882" opacity="0.28"/>

      <path d={`M${sx},${stemBot} C${sx-8},${stemBot-80} ${sx+10},${stemTop+160} ${sx},${stemTop+18}`}
        stroke="url(#sg)" strokeWidth="8" fill="none" strokeLinecap="round"/>
      <path d={`M${sx+2},${stemBot-20} C${sx-5},${stemBot-90} ${sx+12},${stemTop+165} ${sx+2},${stemTop+22}`}
        stroke="#9FD890" strokeWidth="2.5" fill="none" strokeLinecap="round" opacity="0.38"/>

      {[[0.87,-38,-22,8],[0.70,-32,-18,6],[0.53,-28,-15,5]].map(([f,dx,dy,r],i)=>{
        const y=stemTop+18+(stemBot-stemTop-18)*f;
        return(<g key={i}>
          <path d={`M${sx},${y} Q${sx+dx},${y+dy/2} ${sx+dx*1.3},${y+dy}`} stroke="#7BBF6C" strokeWidth="2.2" fill="none" strokeLinecap="round" opacity="0.6"/>
          <ellipse cx={sx+dx*1.3} cy={y+dy} rx={r} ry={r*0.55} fill="#A0D080" opacity="0.55" transform={`rotate(-25,${sx+dx*1.3},${y+dy})`}/>
        </g>);
      })}

      {leaves.map((lf,i)=>{
        const lY=stemTop+18+(stemBot-stemTop-18)*lf.yFrac;
        const prog=progress[lf.sec]||0;
        const w=lf.w+prog*22,h=lf.h+prog*7;
        const x0=sx,x3=x0+w,yT=lY-h*0.46,yB=lY+h*0.54;
        const isH=hov===i;
        const d=`M${x0},${lY} C${x0+w*0.13},${yT-h*0.07} ${x0+w*0.56},${yT} ${x3},${lY} C${x0+w*0.56},${yB} ${x0+w*0.13},${yB+h*0.06} ${x0},${lY}Z`;
        return(
          <g key={lf.sec} style={{cursor:"pointer",transition:"filter 0.2s"}}
            filter={isH?"url(#glow)":"none"}
            onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}
            onClick={()=>onLeafClick(lf.sec)}>
            <path d={d} fill={`url(#lg${i})`} opacity={0.72+prog*0.28} stroke={leafStroke(i)} strokeWidth="0.9"/>
            <path d={`M${x0+8},${lY-h*0.14} C${x0+w*0.2},${yT+h*0.06} ${x0+w*0.5},${yT+h*0.02} ${x0+w*0.74},${lY-h*0.08}`}
              stroke={leafSheen(i)} strokeWidth="3.2" fill="none" strokeLinecap="round" opacity="0.85"/>
            <path d={`M${x0+5},${lY} C${x0+w*0.3},${lY-2} ${x0+w*0.65},${lY-1} ${x3-10},${lY}`}
              stroke={leafText(i)} strokeWidth="0.9" fill="none" opacity="0.3"/>
            <text x={x0+w*0.43} y={lY-2} textAnchor="middle"
              fontSize={i===0?15:i===1?14:13} fontWeight="700"
              fill={leafText(i)} opacity={isH?1:0.88}
              fontFamily="Georgia,serif">
              {SECTIONS.find(s=>s.id===lf.sec)?.label}
            </text>
            <text x={x0+w*0.43} y={lY+13} textAnchor="middle"
              fontSize="10" fill={leafText(i)} opacity={isH?0.7:0}>
              {SECTIONS.find(s=>s.id===lf.sec)?.hint}
            </text>
            {prog>0.08&&<circle cx={x0+w*0.84} cy={lY} r={4+prog*2} fill={leafStroke(i)} opacity="0.75"/>}
            {prog>0.08&&<circle cx={x0+w*0.84} cy={lY} r={2} fill="white" opacity="0.6"/>}
          </g>
        );
      })}

      {/* Outer guard petals */}
      {[[-52,18,-70,-50,-12],[-26,22,-48,-55,0],[26,22,-48,-55,0],[52,18,-70,-50,12]].map(([dx,da,cy1,cy2,rot],i)=>(
        <path key={`gp${i}`}
          d={`M${sx},${stemTop+12} C${sx+dx*0.4},${stemTop+da} ${sx+dx*0.8},${stemTop+cy1+30} ${sx+dx},${stemTop+cy2+40} C${sx+dx*0.6},${stemTop+cy1+20} ${sx+dx*0.2},${stemTop+da-5} ${sx},${stemTop+12}Z`}
          fill="url(#rp1)" opacity="0.82" transform={`rotate(${rot},${sx},${stemTop+12})`}/>
      ))}
      {[0,51,103,154,205,257,309].map((angle,i)=>{
        const r1=36,a=angle*(Math.PI/180);
        const px=sx+Math.cos(a)*r1*0.55,py=stemTop-8+Math.sin(a)*r1*0.4;
        return(<path key={`p2${i}`}
          d={`M${sx},${stemTop} C${sx+Math.cos(a)*18},${stemTop+Math.sin(a)*14} ${px+Math.cos(a)*22},${py+Math.sin(a)*20} ${px+Math.cos(a)*r1},${py+Math.sin(a)*r1*0.72} C${px+Math.cos(a+0.7)*28},${py+Math.sin(a+0.7)*22} ${sx+Math.cos(a+0.35)*20},${stemTop+Math.sin(a+0.35)*16} ${sx},${stemTop}Z`}
          fill="url(#rp2)" opacity="0.87"/>);
      })}
      {[0,45,90,135,180,225,270,315].map((angle,i)=>{
        const r2=22,a=angle*(Math.PI/180);
        const px=sx+Math.cos(a)*r2*0.5,py=stemTop-12+Math.sin(a)*r2*0.4;
        return(<path key={`p3${i}`}
          d={`M${sx},${stemTop-2} C${sx+Math.cos(a)*12},${stemTop-2+Math.sin(a)*10} ${px+Math.cos(a)*14},${py+Math.sin(a)*14} ${px+Math.cos(a)*r2},${py+Math.sin(a)*r2*0.75} C${px+Math.cos(a+0.5)*18},${py+Math.sin(a+0.5)*15} ${sx+Math.cos(a+0.25)*13},${stemTop-2+Math.sin(a+0.25)*10} ${sx},${stemTop-2}Z`}
          fill="url(#rp3)" opacity="0.9"/>);
      })}
      {[0,60,120,180,240,300].map((angle,i)=>{
        const r3=13,a=angle*(Math.PI/180);
        const px=sx+Math.cos(a)*r3*0.45,py=stemTop-18+Math.sin(a)*r3*0.35;
        return(<path key={`p4${i}`}
          d={`M${sx},${stemTop-5} C${sx+Math.cos(a)*8},${stemTop-5+Math.sin(a)*7} ${px+Math.cos(a)*10},${py+Math.sin(a)*10} ${px+Math.cos(a)*r3},${py+Math.sin(a)*r3*0.8} C${px+Math.cos(a+0.6)*12},${py+Math.sin(a+0.6)*10} ${sx+Math.cos(a+0.3)*8},${stemTop-5+Math.sin(a+0.3)*7} ${sx},${stemTop-5}Z`}
          fill="url(#rpC)" opacity="0.92"/>);
      })}

      {/* Centre disc */}
      <circle cx={sx} cy={stemTop-20} r={26} fill="#5A0E22"/>
      <circle cx={sx} cy={stemTop-20} r={23} fill="#7A1838"/>
      <circle cx={sx} cy={stemTop-20} r={20} fill="#9B2448"/>
      <circle cx={sx} cy={stemTop-20} r={17} fill="#C03060"/>
      <circle cx={sx} cy={stemTop-20} r={26} fill="none" stroke="rgba(255,200,220,0.35)" strokeWidth="2"/>

      <path d={`M${sx-16},${stemTop+6} C${sx-24},${stemTop-8} ${sx-28},${stemTop-30} ${sx-18},${stemTop-52}`}
        stroke="#F090B8" strokeWidth="2.5" fill="none" opacity="0.35" strokeLinecap="round"/>
      <path d={`M${sx+8},${stemTop+2} C${sx+6},${stemTop-16} ${sx+8},${stemTop-38} ${sx+12},${stemTop-58}`}
        stroke="#F090B8" strokeWidth="1.8" fill="none" opacity="0.28" strokeLinecap="round"/>

      <path d={`M${sx-10},${stemTop+16} C${sx-14},${stemTop+8} ${sx-7},${stemTop+4} ${sx},${stemTop+2}`} fill="#4A8038" opacity="0.88"/>
      <path d={`M${sx+10},${stemTop+16} C${sx+14},${stemTop+8} ${sx+7},${stemTop+4} ${sx},${stemTop+2}`} fill="#5A9848" opacity="0.88"/>
      <path d={`M${sx},${stemTop+18} C${sx-2},${stemTop+8} ${sx},${stemTop+3} ${sx},${stemTop+2}`} fill="#4A8038" opacity="0.7"/>

      <g style={{cursor:"pointer"}} onClick={onHeadClick}>
        <circle cx={sx} cy={stemTop-20} r={26} fill="rgba(0,0,0,0)"/>
        <text x={sx} y={stemTop-20} textAnchor="middle" dominantBaseline="middle"
          fontSize="17" fontWeight="800" fill="#FFFFFF" fontFamily="Georgia,serif"
          letterSpacing="1.5">Us</text>
      </g>
    </svg>
  );
}

function App(){
  const [screen,     setScreen]    =useState("home");
  const [pIdx,       setPIdx]      =useState(0);
  const [profiles,   setProfiles]  =useState([{},{}]);
  const [qStep,      setQStep]     =useState(0);
  const [activeSec,  setActiveSec] =useState(null);
  const [activeP,    setActiveP]   =useState(0);
  const [subView,    setSubView]   =useState("chat");
  const [chats,      setChats]     =useState({});
  const [curChat,    setCurChat]   =useState([]);
  const [input,      setInput]     =useState("");
  const [loading,    setLoading]   =useState(false);
  const [progress,   setProgress]  =useState({});
  const [stats,      setStats]     =useState({streak:0,conflicts:0,dates:0,lastVisit:null});
  const [summaries,  setSummaries] =useState({});
  const [personas,   setPersonas]  =useState({});
  const [ciHistory,  setCiHistory] =useState([]);
  const [ciAnswers,  setCiAnswers] =useState({});
  const [ciStep,     setCiStep]    =useState(0);
  const [ciInsight,  setCiInsight] =useState("");
  const [ciDone,     setCiDone]    =useState(false);
  const [setupDone,  setSetupDone] =useState(false);
  const [showUs,     setShowUs]    =useState(false);
  const [datingStart,setDatingStart]=useState("");
  const chatEnd=useRef(null);

  useEffect(()=>{
    try{
      const d=JSON.parse(localStorage.getItem("intima_v4")||"{}");
      if(d.profiles)    setProfiles(d.profiles);
      if(d.progress)    setProgress(d.progress);
      if(d.chats)       setChats(d.chats);
      if(d.stats)       setStats(d.stats);
      if(d.summaries)   setSummaries(d.summaries);
      if(d.personas)    setPersonas(d.personas);
      if(d.ciHistory)   setCiHistory(d.ciHistory);
      if(d.datingStart) setDatingStart(d.datingStart);
      if(d.setupDone)   setSetupDone(true);
    }catch(e){}
  },[]);

  useEffect(()=>{
    try{localStorage.setItem("intima_v4",JSON.stringify({profiles,progress,chats,stats,summaries,personas,ciHistory,setupDone,datingStart}));}catch(e){}
  },[profiles,progress,chats,stats,summaries,personas,ciHistory,setupDone,datingStart]);

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[curChat]);

  useEffect(()=>{
    if(!setupDone)return;
    const today=new Date().toDateString();
    setStats(p=>{
      if(p.lastVisit===today)return p;
      const y=new Date(Date.now()-86400000).toDateString();
      return{...p,streak:p.lastVisit===y?p.streak+1:1,lastVisit:today};
    });
  },[setupDone]);

  const saveAns=(k,v)=>setProfiles(p=>{const n=[...p];n[pIdx]={...n[pIdx],[k]:v};return n;});
  const bump=(sec,amt=0.14)=>setProgress(p=>({...p,[sec]:Math.min(1,(p[sec]||0)+amt)}));
  const nextProfileQ=()=>{
    if(qStep<PROFILE_QS.length-1)setQStep(q=>q+1);
    else if(pIdx===0){setPIdx(1);setQStep(0);}
    else{setSetupDone(true);setScreen("home");}
  };

  const openSec=sec=>{
    if(sec==="checkins"){setCiStep(0);setCiAnswers({});setCiInsight("");setCiDone(false);setScreen("checkin");return;}
    setActiveSec(sec);setSubView("chat");setCurChat(chats[`${sec}_${activeP}`]||[]);setScreen("chat");
  };

  const send=async msg=>{
    if(!msg.trim()||loading)return;
    const prof=profiles[activeP],key=`${activeSec}_${activeP}`;
    const ci=ciHistory.filter(c=>c.pIdx===activeP).slice(-3).map(c=>JSON.stringify(c.answers)).join(" ");
    const updated=[...curChat,{role:"user",content:msg}];
    setCurChat(updated);setInput("");setLoading(true);
    try{
      const reply=await api(SYS(prof,activeSec,ci),updated);
      const final=[...updated,{role:"assistant",content:reply}];
      setCurChat(final);setChats(p=>({...p,[key]:final}));bump(activeSec);
      if(activeSec==="conflicts")setStats(p=>({...p,conflicts:p.conflicts+1}));
    }catch(e){setCurChat([...updated,{role:"assistant",content:"Something went wrong. Please try again."}]);}
    setLoading(false);
  };

  const genSummary=async()=>{
    const key=`${activeSec}_${activeP}`,msgs=chats[key];
    if(!msgs||msgs.length<2)return;setLoading(true);
    const t=await api(null,[{role:"user",content:`Summarize this conflict session warmly: what happened, how it was approached, the lesson learned, one insight to carry forward.\n\n${msgs.map(m=>`${m.role}: ${m.content}`).join("\n")}`}],600);
    setSummaries(p=>({...p,[key]:t}));setLoading(false);
  };

  const genPersona=async pi=>{
    const prof=profiles[pi];
    const hist=Object.entries(chats).filter(([k])=>k.endsWith(`_${pi}`)).map(([,v])=>v.map(m=>m.content).join(" ")).join("\n");
    const myCI=ciHistory.filter(c=>c.pIdx===pi);
    setLoading(true);
    const t=await api(null,[{role:"user",content:`Write a warm personality portrait for ${prof.name||"Partner"}. Communication style, emotional needs, growth edges, one affirmation. 4 short paragraphs.\nProfile:${JSON.stringify(prof)}\nHistory:${hist}\nCheckins:${JSON.stringify(myCI)}`}],800);
    setPersonas(p=>({...p,[pi]:t}));setLoading(false);
  };

  const submitCI=async()=>{
    const prof=profiles[activeP];setLoading(true);
    setCiHistory(p=>[...p,{pIdx:activeP,date:new Date().toISOString(),answers:ciAnswers}]);
    bump("checkins",0.18);
    const t=await api(null,[{role:"user",content:`You are Intima. Based on these check-in answers from ${prof.name||"a partner"}, give a brief warm personalized insight (2–3 sentences) and one gentle suggestion for today.\nAnswers:${JSON.stringify(ciAnswers)}`}],300);
    setCiInsight(t||"Thank you for checking in. Your answers help Intima know you better.");
    setCiDone(true);setLoading(false);
  };

  const totalProg=SECTIONS.reduce((s,sec)=>s+(progress[sec.id]||0),0);
  const intimacyPct=Math.round((totalProg/SECTIONS.length)*100);
  const p1=profiles[0]?.name||"Partner 1";
  const p2=profiles[1]?.name||"Partner 2";

  const s={
    app: {background:C.cream,maxWidth:375,margin:"0 auto",minHeight:"100vh",fontFamily:"'Segoe UI',system-ui,sans-serif",color:C.text,display:"flex",flexDirection:"column"},
    hdr: {padding:"18px 22px 14px",display:"flex",alignItems:"center",gap:10},
    logo:{fontSize:26,fontWeight:700,color:C.rose,fontFamily:"Georgia,serif",letterSpacing:"-0.5px"},
    btn: (bg=C.rose,full=true)=>({background:bg,color:"#fff",border:"none",borderRadius:32,padding:"15px 0",fontSize:15,fontWeight:600,cursor:"pointer",width:full?"100%":"auto",letterSpacing:"0.2px",boxShadow:`0 6px 20px ${bg}44`}),
    btnO:(col=C.rose)=>({background:"transparent",color:col,border:`1.5px solid ${col}`,borderRadius:32,padding:"13px 0",fontSize:15,fontWeight:500,cursor:"pointer",width:"100%"}),
    card:{background:C.white,borderRadius:22,padding:"20px",boxShadow:"0 2px 20px rgba(0,0,0,0.07)",border:`0.5px solid ${C.rosePale}`},
    chip:(sel,col=C.rose)=>({background:sel?`${col}15`:"transparent",color:sel?col:"#888",border:`1.5px solid ${sel?col:"#E8E0E4"}`,borderRadius:14,padding:"13px 16px",fontSize:14,cursor:"pointer",marginBottom:9,width:"100%",textAlign:"left",display:"block"}),
  };

  const PartnerPills=()=>(
    <div style={{display:"flex",gap:6,background:"rgba(255,255,255,0.7)",borderRadius:24,padding:4}}>
      {[0,1].map(i=>(
        <button key={i} onClick={()=>{setActiveP(i);if(screen==="chat"&&activeSec){const k=`${activeSec}_${i}`;setCurChat(chats[k]||[]);}}}
          style={{background:activeP===i?C.rose:"transparent",color:activeP===i?"#fff":C.textMid,border:"none",borderRadius:20,padding:"7px 18px",fontSize:13,cursor:"pointer"}}>
          {(i===0?p1:p2).split(" ")[0]}
        </button>
      ))}
    </div>
  );

  const SubTabs=({tabs})=>(
    <div style={{display:"flex",borderBottom:`1px solid ${C.rosePale}`}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setSubView(t.id)}
          style={{flex:1,padding:"13px 0",fontSize:13,fontWeight:subView===t.id?700:400,color:subView===t.id?C.rose:"#aaa",background:"transparent",border:"none",borderBottom:subView===t.id?`2.5px solid ${C.rose}`:"2.5px solid transparent",cursor:"pointer"}}>
          {t.label}
        </button>
      ))}
    </div>
  );

  const LOVE_META={
    "Quality time together":{icon:"⏳",color:"#7B9FC4",label:"Time",     desc:"Presence is your love language"},
    "Words of appreciation":{icon:"💬",color:"#C47BAA",label:"Words",    desc:"Affirmation fills your cup"},
    "Physical affection":   {icon:"🤝",color:"#C47B7B",label:"Touch",    desc:"Closeness speaks louder than words"},
    "Thoughtful gestures":  {icon:"🎁",color:"#C4A87B",label:"Gifts",    desc:"Small acts carry big meaning"},
    "Acts of help":         {icon:"🛠",color:"#7BC47B",label:"Acts",     desc:"Actions show your love"},
  };
  const STYLE_META={
    "Go quiet":          {icon:"🌊",color:"#7B9FC4",bar:0.15,label:"Withdraws inward"},
    "Talk immediately":  {icon:"🔥",color:"#C47B7B",bar:0.9, label:"Confronts directly"},
    "Need time first":   {icon:"🌙",color:"#9B7BC4",bar:0.5, label:"Processes then talks"},
    "Explode, then calm":{icon:"⚡",color:"#C4A87B",bar:0.75,label:"Intense, then settles"},
  };
  const FEAR_META={
    "Being abandoned":    {icon:"🪢",color:"#C47B9F"},
    "Losing independence":{icon:"🦅",color:"#7B9FC4"},
    "Not being enough":   {icon:"🪞",color:"#C4A87B"},
    "Endless conflict":   {icon:"🌀",color:"#C47B7B"},
    "Growing apart":      {icon:"🌿",color:"#7BC47B"},
  };
  const AFTER_META={
    "Hugs & presence":     {icon:"🫂",color:"#C47B9F"},
    "Space to decompress": {icon:"🌬",color:"#7B9FC4"},
    "Someone to listen":   {icon:"👂",color:"#C4A87B"},
    "Distraction & fun":   {icon:"🎉",color:"#7BC47B"},
  };

  const PortraitVisuals=({prof})=>{
    const love =LOVE_META[prof.love] ||{icon:"💛",color:C.rose,label:"Love",desc:"Your unique way of loving"};
    const style=STYLE_META[prof.style]||{icon:"💭",color:C.rose,bar:0.5,label:"Your conflict style"};
    const fear =FEAR_META[prof.fear] ||{icon:"🌑",color:C.rose};
    const after=AFTER_META[prof.after]||{icon:"🌙",color:C.rose};
    const vals=[
      prof.style==="Talk immediately"?0.9:prof.style==="Need time first"?0.7:0.4,
      prof.love==="Physical affection"||prof.love==="Quality time together"?0.85:0.65,
      prof.fear==="Endless conflict"?0.5:0.75,
      prof.after==="Space to decompress"?0.8:0.6,
      prof.love==="Words of appreciation"||prof.love==="Thoughtful gestures"?0.9:0.65,
    ];
    const pts=vals.map((v,i)=>{const a=i*72-90;return`${100+Math.cos(a*Math.PI/180)*50*v},${80+Math.sin(a*Math.PI/180)*40*v}`;}).join(" ");
    return(
      <div style={{marginBottom:20}}>
        <div style={{...s.card,marginBottom:12,padding:"22px 20px",background:`linear-gradient(135deg,${love.color}18,${love.color}08)`}}>
          <div style={{fontSize:11,fontWeight:700,color:C.textSoft,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:10}}>Love language</div>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{width:56,height:56,borderRadius:18,background:`${love.color}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>{love.icon}</div>
            <div>
              <div style={{fontSize:20,fontWeight:700,color:love.color,fontFamily:"Georgia,serif"}}>{love.label}</div>
              <div style={{fontSize:13,color:C.textMid,marginTop:3,lineHeight:1.5}}>{love.desc}</div>
            </div>
          </div>
        </div>
        <div style={{...s.card,marginBottom:12,padding:"20px"}}>
          <div style={{fontSize:11,fontWeight:700,color:C.textSoft,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:12}}>Conflict style</div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <span style={{fontSize:22}}>{style.icon}</span>
            <span style={{fontSize:14,fontWeight:600,color:C.text}}>{style.label}</span>
          </div>
          <div style={{fontSize:11,color:C.textSoft,display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span>Avoidant</span><span>Direct</span>
          </div>
          <div style={{height:8,background:C.rosePale,borderRadius:8,overflow:"hidden"}}>
            <div style={{width:`${style.bar*100}%`,height:"100%",background:`linear-gradient(90deg,#7B9FC4,${style.color})`,borderRadius:8}}/>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div style={{...s.card,padding:"18px 14px",background:`${fear.color}0A`}}>
            <div style={{fontSize:10,fontWeight:700,color:C.textSoft,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>Core fear</div>
            <div style={{fontSize:26,marginBottom:6}}>{fear.icon}</div>
            <div style={{fontSize:12,fontWeight:600,color:fear.color,lineHeight:1.4}}>{prof.fear}</div>
          </div>
          <div style={{...s.card,padding:"18px 14px",background:`${after.color}0A`}}>
            <div style={{fontSize:10,fontWeight:700,color:C.textSoft,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>After hard days</div>
            <div style={{fontSize:26,marginBottom:6}}>{after.icon}</div>
            <div style={{fontSize:12,fontWeight:600,color:after.color,lineHeight:1.4}}>{prof.after}</div>
          </div>
        </div>
        <div style={{...s.card,padding:"20px",textAlign:"center"}}>
          <div style={{fontSize:11,fontWeight:700,color:C.textSoft,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:16}}>Trait snapshot</div>
          <svg viewBox="0 0 200 160" width="100%" style={{maxWidth:240,display:"block",margin:"0 auto"}}>
            {[["Openness",100,14],["Warmth",178,80],["Resilience",155,148],["Grounding",45,148],["Depth",22,80]].map(([lbl,lx,ly])=>(
              <text key={lbl} x={lx} y={ly} textAnchor="middle" fontSize="9" fill={C.textSoft}>{lbl}</text>
            ))}
            {[0.3,0.6,1].map((r,ri)=>(
              <polygon key={ri} points={[0,1,2,3,4].map(i=>{const a=i*72-90;return`${100+Math.cos(a*Math.PI/180)*50*r},${80+Math.sin(a*Math.PI/180)*40*r}`;}).join(" ")}
                fill="none" stroke={C.rosePale} strokeWidth="0.8"/>
            ))}
            <polygon points={pts} fill={`${C.rose}28`} stroke={C.rose} strokeWidth="1.5"/>
          </svg>
        </div>
      </div>
    );
  };

  const datingDays=datingStart?Math.floor((Date.now()-new Date(datingStart).getTime())/86400000):null;
  const datingYears=datingDays!==null?Math.floor(datingDays/365):0;
  const datingMonths=datingDays!==null?Math.floor((datingDays%365)/30):0;
  const datingRem=datingDays!==null?datingDays%30:0;
  const milestones=[
    {days:1,  label:"First day", icon:"🌱"},
    {days:7,  label:"One week",  icon:"🌷"},
    {days:30, label:"One month", icon:"🌹"},
    {days:100,label:"100 days",  icon:"✨"},
    {days:365,label:"One year",  icon:"🥂"},
    {days:730,label:"Two years", icon:"💍"},
    {days:1825,label:"Five years",icon:"🌟"},
  ];

  // US
  if(showUs) return(
    <div style={s.app}>
      <div style={s.hdr}>
        <button onClick={()=>setShowUs(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:C.textSoft,padding:0}}>←</button>
        <span style={s.logo}>Us</span>
        <span style={{marginLeft:"auto",fontSize:20}}>🌹</span>
      </div>
      <div style={{flex:1,padding:"0 22px 80px",overflowY:"auto"}}>
        <div style={{...s.card,textAlign:"center",marginBottom:16,padding:"28px 20px"}}>
          <svg width="148" height="148" viewBox="0 0 148 148" style={{margin:"0 auto 12px",display:"block"}}>
            <circle cx="74" cy="74" r="60" fill="none" stroke={C.rosePale} strokeWidth="12"/>
            <circle cx="74" cy="74" r="60" fill="none" stroke={C.rose} strokeWidth="12"
              strokeDasharray={`${2*Math.PI*60*intimacyPct/100} ${2*Math.PI*60}`}
              strokeLinecap="round" transform="rotate(-90 74 74)"/>
            <text x="74" y="68" textAnchor="middle" fontSize="30" fontWeight="700" fill={C.rose} fontFamily="Georgia,serif">{intimacyPct}%</text>
            <text x="74" y="88" textAnchor="middle" fontSize="12" fill={C.textSoft}>intimacy level</text>
          </svg>
          <div style={{fontSize:14,color:C.textMid,fontStyle:"italic"}}>
            {intimacyPct<20?"Just beginning to bloom 🌱":intimacyPct<50?"Growing together 🌷":intimacyPct<80?"Deeply connected 🌸":"Flourishing in love 🌺"}
          </div>
        </div>

        <div style={{...s.card,marginBottom:16,padding:"22px 20px"}}>
          <div style={{fontSize:12,fontWeight:700,color:C.textSoft,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:14}}>Our journey</div>
          {!datingStart?(
            <div>
              <p style={{fontSize:13,color:C.textSoft,marginBottom:12,lineHeight:1.6}}>When did you two start dating?</p>
              <input type="date" value={datingStart} onChange={e=>setDatingStart(e.target.value)}
                style={{width:"100%",borderRadius:12,border:`1.5px solid ${C.roseLight}`,padding:"11px 14px",fontSize:14,color:C.text,background:"#FAFAFA",outline:"none",boxSizing:"border-box"}}/>
            </div>
          ):(
            <>
              <div style={{textAlign:"center",marginBottom:20}}>
                <div style={{fontSize:52,fontWeight:800,color:C.rose,lineHeight:1,fontFamily:"Georgia,serif"}}>{datingDays}</div>
                <div style={{fontSize:14,color:C.textSoft,marginTop:4}}>days together</div>
                <div style={{fontSize:13,color:C.textMid,marginTop:6,fontStyle:"italic"}}>
                  {datingYears>0?`${datingYears}y `:""}{datingMonths>0?`${datingMonths}mo `:""}{datingRem>0?`${datingRem}d`:""}
                </div>
              </div>
              <div style={{position:"relative",padding:"0 0 8px"}}>
                <div style={{position:"absolute",left:18,top:12,bottom:20,width:2,background:C.rosePale,borderRadius:2}}/>
                {milestones.map((m,i)=>{
                  const reached=datingDays>=m.days;
                  const isNext=!reached&&(i===0||datingDays>=milestones[i-1].days);
                  return(
                    <div key={m.days} style={{display:"flex",alignItems:"center",gap:14,marginBottom:16,position:"relative"}}>
                      <div style={{width:36,height:36,borderRadius:"50%",background:reached?C.rose:isNext?"#fff":C.rosePale,border:`2.5px solid ${reached?C.rose:isNext?C.roseLight:"#EEE"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,zIndex:1,boxShadow:reached?`0 4px 14px ${C.rose}44`:"none"}}>
                        {reached||isNext?m.icon:<span style={{fontSize:10,color:"#CCC"}}>○</span>}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:reached?700:400,color:reached?C.text:C.textSoft}}>{m.label}</div>
                        <div style={{fontSize:11,color:reached?C.rose:isNext?"#C8A0B0":"#DDD",marginTop:1}}>
                          {reached?"Reached ✓":isNext?`${m.days-datingDays} days to go`:`${m.days} days`}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <button onClick={()=>setDatingStart("")} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:C.textSoft,padding:0,textDecoration:"underline"}}>Change date</button>
            </>
          )}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
          {[{l:"Day streak",v:stats.streak,e:"🔥",c:"#C07040"},{l:"Conflicts eased",v:stats.conflicts,e:"⚡",c:"#9B3040"},{l:"Check-ins",v:ciHistory.length,e:"✅",c:"#3A7040"},{l:"Dates together",v:stats.dates,e:"🕯",c:"#5A5A9B"}].map(st=>(
            <div key={st.l} style={{...s.card,padding:"18px 16px"}}>
              <div style={{fontSize:26,marginBottom:6}}>{st.e}</div>
              <div style={{fontSize:32,fontWeight:700,color:st.c,lineHeight:1,fontFamily:"Georgia,serif"}}>{st.v}</div>
              <div style={{fontSize:11,color:C.textSoft,marginTop:4}}>{st.l}</div>
            </div>
          ))}
        </div>
        <button style={s.btn("#5A5A9B")} onClick={()=>setStats(p=>({...p,dates:p.dates+1}))}>+ Log a date together 🕯</button>
        <div style={{height:12}}/>
        <button style={s.btnO()} onClick={()=>setShowUs(false)}>Back</button>
      </div>
    </div>
  );

  // SETUP
  if(screen==="setup"){
    const q=PROFILE_QS[qStep],val=profiles[pIdx][q.id]||"";
    return(
      <div style={s.app}>
        <div style={s.hdr}>
          <span style={s.logo}>Intima</span>
          <span style={{marginLeft:"auto",fontSize:12,color:C.textSoft,background:C.rosePale,padding:"4px 12px",borderRadius:16}}>{pIdx===0?"Partner 1":"Partner 2"} · {qStep+1}/{PROFILE_QS.length}</span>
        </div>
        <div style={{height:3,background:C.rosePale,margin:"0 22px 24px"}}>
          <div style={{height:"100%",background:C.rose,borderRadius:4,width:`${((qStep+(pIdx*PROFILE_QS.length))/(PROFILE_QS.length*2))*100}%`}}/>
        </div>
        <div style={{flex:1,padding:"0 22px 90px",overflowY:"auto"}}>
          {qStep===0&&<p style={{fontSize:13,color:C.textSoft,marginBottom:22,lineHeight:1.8}}>{pIdx===0?"Let's start with you. Your answers stay private and shape how Intima coaches you.":`Now ${p2} — same promise.`}</p>}
          <div style={{...s.card,marginBottom:20}}>
            <p style={{fontSize:17,fontWeight:600,marginBottom:20,lineHeight:1.5,color:C.text,fontFamily:"Georgia,serif"}}>{q.q}</p>
            {q.type==="text"
              ?<input style={{width:"100%",borderRadius:14,border:`1.5px solid ${val?C.rose:"#E0D8DC"}`,padding:"14px 16px",fontSize:15,background:"#FAFAFA",color:C.text,outline:"none",boxSizing:"border-box"}}
                  placeholder={q.placeholder} value={val}
                  onChange={e=>saveAns(q.id,e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&val&&nextProfileQ()}/>
              :q.options.map(o=><button key={o} style={s.chip(val===o)} onClick={()=>saveAns(q.id,o)}>{o}</button>)}
          </div>
          <button style={{...s.btn(),opacity:val?1:0.4}} onClick={nextProfileQ} disabled={!val}>
            {qStep===PROFILE_QS.length-1&&pIdx===1?"Start your journey 🌸":"Continue →"}
          </button>
          {qStep===0&&pIdx===0&&<><div style={{height:12}}/><button style={s.btnO()} onClick={()=>{setSetupDone(true);setScreen("home");}}>Skip for now</button></>}
        </div>
      </div>
    );
  }

  // CHECK-IN
  if(screen==="checkin"){
    const q=CHECKIN_QS[ciStep],val=ciAnswers[q?.id]||"";
    return(
      <div style={s.app}>
        <div style={s.hdr}>
          <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:C.textSoft,padding:0}}>←</button>
          <span style={{...s.logo,fontSize:20,color:C.leafG}}>Daily check-in</span>
          <div style={{marginLeft:"auto"}}><PartnerPills/></div>
        </div>
        <div style={{height:4,background:C.rosePale,margin:"0 22px 26px",borderRadius:4}}>
          <div style={{height:"100%",background:C.leafG,borderRadius:4,width:`${(ciStep/CHECKIN_QS.length)*100}%`}}/>
        </div>
        <div style={{flex:1,padding:"0 22px 90px",overflowY:"auto"}}>
          {ciDone?(
            <div style={{textAlign:"center",paddingTop:24}}>
              <div style={{fontSize:56,marginBottom:18}}>🌸</div>
              <div style={{fontSize:22,fontWeight:700,color:C.rose,fontFamily:"Georgia,serif",marginBottom:6}}>All done</div>
              <div style={{fontSize:14,color:C.textSoft,marginBottom:24}}>Thank you for checking in, {profiles[activeP]?.name||""}.</div>
              {loading?<div style={{color:C.textSoft,fontSize:14,fontStyle:"italic"}}>Intima is reflecting…</div>
                :<div style={{...s.card,textAlign:"left",fontSize:14,lineHeight:1.8,color:"#444"}}>{ciInsight}</div>}
              <div style={{height:24}}/><button style={s.btn()} onClick={()=>setScreen("home")}>Back to Intima</button>
            </div>
          ):(
            <>
              <div style={{...s.card,marginBottom:20}}>
                <p style={{fontSize:17,fontWeight:600,marginBottom:20,lineHeight:1.5,color:C.text,fontFamily:"Georgia,serif"}}>{q?.q}</p>
                {q?.type==="text"
                  ?<textarea style={{width:"100%",borderRadius:14,border:`1.5px solid ${val?C.leafG:"#E0D8DC"}`,padding:"14px 16px",fontSize:14,background:"#FAFAFA",color:C.text,outline:"none",minHeight:108,resize:"none",boxSizing:"border-box"}}
                      placeholder={q.placeholder} value={val}
                      onChange={e=>setCiAnswers(p=>({...p,[q.id]:e.target.value}))}/>
                  :q?.options.map(o=><button key={o} style={s.chip(val===o,C.leafG)} onClick={()=>setCiAnswers(p=>({...p,[q.id]:o}))}>{o}</button>)}
              </div>
              <button style={{...s.btn(C.leafG),opacity:val?1:0.4}} disabled={!val}
                onClick={()=>{if(!val)return;if(ciStep<CHECKIN_QS.length-1)setCiStep(st=>st+1);else submitCI();}}>
                {ciStep<CHECKIN_QS.length-1?"Next →":"Complete ✅"}
              </button>
            </>
          )}
        </div>
      </div>
    );
  }

  // CHAT
  if(screen==="chat"){
    const isPersona=activeSec==="persona";
    const sec=SECTIONS.find(s=>s.id===activeSec);
    const chatKey=`${activeSec}_${activeP}`;
    const tabs=[{id:"chat",label:"Chat"},...(activeSec==="conflicts"?[{id:"lessons",label:"Lessons"}]:[]),{id:"history",label:"History"}];
    return(
      <div style={{...s.app,height:"100vh"}}>
        <div style={{...s.hdr,borderBottom:`1px solid ${C.rosePale}`}}>
          <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:C.textSoft,padding:0}}>←</button>
          <div style={{flex:1,marginLeft:4}}>
            <div style={{fontWeight:700,fontSize:16,color:C.rose,fontFamily:"Georgia,serif"}}>{isPersona?`${profiles[activeP]?.name||"Partner"}'s portrait`:sec?.label}</div>
            <div style={{fontSize:11,color:C.textSoft,marginTop:1}}>{profiles[activeP]?.name||`Partner ${activeP+1}`}</div>
          </div>
          <PartnerPills/>
        </div>
        {!isPersona&&<SubTabs tabs={tabs}/>}
        <div style={{flex:1,overflowY:"auto",padding:"18px 20px 100px",display:"flex",flexDirection:"column",gap:2}}>
          {isPersona&&(
            <div>
              <div style={{textAlign:"center",margin:"12px 0 22px"}}>
                <div style={{width:76,height:76,borderRadius:"50%",background:C.rosePale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,margin:"0 auto 14px"}}>🌸</div>
                <div style={{fontWeight:700,fontSize:20,color:C.rose,fontFamily:"Georgia,serif"}}>{profiles[activeP]?.name||"Partner"}'s portrait</div>
                <div style={{fontSize:12,color:C.textSoft,marginTop:4,fontStyle:"italic"}}>Evolves as you explore together</div>
              </div>
              {profiles[activeP]?.love&&<PortraitVisuals prof={profiles[activeP]}/>}
              {loading&&<p style={{textAlign:"center",color:C.textSoft,fontStyle:"italic",fontSize:14,marginTop:8}}>Weaving your portrait…</p>}
              {personas[activeP]&&!loading&&<div style={{...s.card,fontSize:14,lineHeight:1.85,marginTop:4}}>{personas[activeP]}</div>}
              {!profiles[activeP]?.love&&<p style={{textAlign:"center",color:C.textSoft,fontSize:13,fontStyle:"italic",padding:"24px 0"}}>Complete your profile setup to see your portrait.</p>}
              <div style={{height:20}}/>
              <button style={s.btn()} onClick={()=>genPersona(activeP)}>{personas[activeP]?"Refresh AI portrait ✨":"Generate AI portrait 🌸"}</button>
            </div>
          )}
          {subView==="history"&&!isPersona&&(
            chats[chatKey]?.filter(m=>m.role==="user").length>0
              ?chats[chatKey].filter(m=>m.role==="user").map((m,i)=>(
                <div key={i} style={{background:C.white,borderRadius:14,padding:"13px 16px",fontSize:13,color:"#666",borderLeft:`3px solid ${C.roseLight}`,lineHeight:1.7,marginBottom:8,boxShadow:"0 1px 8px rgba(0,0,0,0.04)"}}>
                  {m.content.slice(0,160)}{m.content.length>160?"…":""}
                </div>
              ))
              :<p style={{textAlign:"center",color:C.textSoft,fontSize:13,fontStyle:"italic",padding:"32px 0"}}>No conversations yet.</p>
          )}
          {subView==="lessons"&&!isPersona&&(
            <div>
              {loading&&<p style={{textAlign:"center",color:C.textSoft,fontStyle:"italic",fontSize:14}}>Reflecting on your conflicts…</p>}
              {summaries[chatKey]&&!loading&&<div style={{...s.card,fontSize:14,lineHeight:1.85}}>{summaries[chatKey]}</div>}
              {!summaries[chatKey]&&!loading&&<p style={{textAlign:"center",color:C.textSoft,fontSize:13,fontStyle:"italic",padding:"24px 0"}}>Have a conflict session first.</p>}
              <div style={{height:18}}/><button style={s.btn()} onClick={genSummary}>{summaries[chatKey]?"Refresh ✨":"Generate lessons ✨"}</button>
            </div>
          )}
          {subView==="chat"&&!isPersona&&(
            <>
              {curChat.length===0&&(
                <div>
                  <p style={{fontSize:13,color:C.textSoft,textAlign:"center",marginBottom:20,fontStyle:"italic"}}>Hi {profiles[activeP]?.name||"there"} 🌸 What's on your mind?</p>
                  <div style={{display:"flex",flexDirection:"column",gap:9}}>
                    {PROMPTS[activeSec]?.map(pr=>(
                      <button key={pr} onClick={()=>send(pr)}
                        style={{background:C.white,border:`0.5px solid ${C.rosePale}`,borderRadius:16,padding:"14px 18px",fontSize:13,cursor:"pointer",color:"#666",textAlign:"left",lineHeight:1.6,boxShadow:"0 2px 10px rgba(0,0,0,0.05)"}}>
                        {pr}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              {curChat.map((m,i)=>(
                <div key={i} style={{background:m.role==="user"?C.rose:C.white,color:m.role==="user"?"#fff":"#444",borderRadius:m.role==="user"?"22px 22px 6px 22px":"22px 22px 22px 6px",padding:"13px 18px",fontSize:14,lineHeight:1.75,maxWidth:"85%",alignSelf:m.role==="user"?"flex-end":"flex-start",whiteSpace:"pre-wrap",boxShadow:m.role==="user"?`0 4px 16px ${C.rose}44`:"0 2px 12px rgba(0,0,0,0.07)"}}>
                  {m.content}
                </div>
              ))}
              {loading&&<div style={{background:C.white,borderRadius:"22px 22px 22px 6px",padding:"13px 18px",fontSize:13,color:C.textSoft,alignSelf:"flex-start",fontStyle:"italic",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>Intima is thinking…</div>}
              <div ref={chatEnd}/>
            </>
          )}
        </div>
        {subView==="chat"&&!isPersona&&(
          <div style={{background:C.cream,borderTop:`1px solid ${C.rosePale}`,padding:"12px 18px 20px",display:"flex",gap:10,alignItems:"center"}}>
            <input style={{flex:1,borderRadius:28,border:`1.5px solid ${C.rosePale}`,padding:"13px 20px",fontSize:14,background:C.white,color:C.text,outline:"none",boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}
              placeholder="Type your thoughts…" value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&send(input)}/>
            <button onClick={()=>send(input)}
              style={{background:C.rose,color:"#fff",border:"none",borderRadius:"50%",width:48,height:48,cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 6px 18px ${C.rose}55`}}>→</button>
          </div>
        )}
      </div>
    );
  }

  // HOME
  return(
    <div style={{...s.app,overflow:"hidden",position:"relative"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,zIndex:20,display:"flex",alignItems:"center",padding:"18px 22px 0"}}>
        <div style={{display:"flex",flexDirection:"column"}}>
          <span style={{...s.logo,fontSize:28,lineHeight:1}}>Intima</span>
          <span style={{fontSize:11,color:C.textSoft,letterSpacing:"2px",marginTop:2}}>YOUR RELATIONSHIP COACH</span>
        </div>
        <div style={{marginLeft:"auto",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
          {setupDone&&<span style={{fontSize:12,color:C.rose,background:"rgba(255,255,255,0.88)",padding:"5px 14px",borderRadius:20,fontWeight:600}}>🔥 {stats.streak} day{stats.streak!==1?"s":""}</span>}
          {!setupDone&&(
            <button onClick={()=>{setPIdx(0);setQStep(0);setScreen("setup");}}
              style={{...s.btn(),width:"auto",padding:"10px 22px",fontSize:14}}>Set up your profile →</button>
          )}
        </div>
      </div>
      <div style={{position:"relative",width:"100%",overflow:"hidden",flexShrink:0}}>
        <RoseSVG progress={progress} onLeafClick={setupDone?openSec:()=>{}} onHeadClick={()=>setShowUs(true)}/>
        {!setupDone&&(
          <div style={{position:"absolute",bottom:40,left:100,right:16,background:"rgba(255,255,255,0.92)",borderRadius:16,padding:"12px 16px",fontSize:13,color:C.textMid,lineHeight:1.7,boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>
            Tap the leaves to explore sections after setting up your profile.
          </div>
        )}
      </div>
      {setupDone&&(
        <div style={{position:"absolute",bottom:0,left:0,right:0,zIndex:20,padding:"12px 22px 18px",display:"flex",gap:10,alignItems:"stretch",background:"linear-gradient(to bottom, transparent, rgba(251,247,244,0.97) 28%)"}}>
          {[0,1].map(i=>(
            <button key={i} onClick={()=>{setActiveP(i);setActiveSec("persona");setSubView("persona");setScreen("chat");}}
              style={{flex:1,background:"rgba(255,255,255,0.92)",border:`0.5px solid ${C.rosePale}`,borderRadius:18,padding:"13px",cursor:"pointer",textAlign:"left",boxShadow:"0 2px 14px rgba(0,0,0,0.08)",display:"flex",alignItems:"center",gap:10,backdropFilter:"blur(6px)"}}>
              <div style={{width:34,height:34,borderRadius:"50%",background:C.rosePale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>🌸</div>
              <div>
                <div style={{fontWeight:600,fontSize:13,color:C.rose}}>{profiles[i]?.name||`Partner ${i+1}`}</div>
                <div style={{fontSize:11,color:C.textSoft,marginTop:1}}>View portrait →</div>
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
